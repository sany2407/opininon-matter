<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Transparent Canvas / No background layer so it adapts to browser light/dark themes -->
  <g fill="none" stroke="#000000" stroke-width="54" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 1. The Outer Loop (The Letter O) -->
    <path d="M 120 230 
             C 120 130, 180 80, 256 80 
             C 332 80, 392 130, 392 230 
             L 392 320 
             C 392 390, 332 432, 256 432 
             C 180 432, 120 390, 120 320 
             Z" />

    <!-- 2. The Internal Folds (The Letter M) -->
    <!-- Precise geometric paths nested inside the O -->
    <path d="M 180 340 
             L 218 180 
             L 256 235 
             L 294 180 
             L 332 340" />
             
  </g>
</svg>
